spring.application.name=auth-app-backend
server.port=8081

# Database Configuration (MySQL example)
spring.datasource.url=jdbc:mysql://localhost:3306/auth_app
spring.datasource.username=root
spring.datasource.password=root

# HikariCP Settings
#spring.datasource.hikari.maximum-pool-size=10
#spring.datasource.hikari.minimum-idle=5
#spring.datasource.hikari.idle-timeout=30000
#spring.datasource.hikari.max-lifetime=1800000
#spring.datasource.hikari.connection-timeout=20000
#spring.datasource.hikari.pool-name=MyHikariPool

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework.security=DEBUG

# JWT secret with fallback value
security.jwt.secret=${JWT_SECRET:saiofal;vkasfbehwqopfhjashofjaswfpojasfvbafop[hfifonfo[shjfwefjjfsla}

# JWT issuer with fallback
security.jwt.issuer=${JWT_ISSUER:api.substring.com}

# JWT access token TTL in seconds with fallback
security.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:3600}

# JWT refresh token TTL in seconds with fallback
security.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:86400}

# Refresh token cookie name with fallback
security.jwt.refresh-token-cookie-name=${JWT_REFRESH_COOKIE_NAME:refreshToken}

# Cookie secure flag with fallback
security.jwt.cookie-secure=${JWT_COOKIE_SECURE:true}

# Cookie HttpOnly flag with fallback
security.jwt.cookie-http-only=${JWT_COOKIE_HTTP_ONLY:true}

# Cookie SameSite attribute with fallback
security.jwt.cookie-same-site=${JWT_COOKIE_SAME_SITE:lax}

security.jwt.cookie-domain=${JWT_COOKIE_DOMAIN:localhost}

# Google OAuth2 (using environment variables)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test-client-secret}

spring.security.oauth2.client.registration.google.scope=${GOOGLE_SCOPE:email,profile,openid}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

#GITHUB OAuth2 (using environment variables)
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:test-client-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:test-client-secret}

spring.security.oauth2.client.registration.github.scope=read:user,user:email

app.auth.frontend.success-redirect=http://localhost:5173/auth/success
app.auth.frontend.fallback-redirect=http://localhost:5173/auth/failure